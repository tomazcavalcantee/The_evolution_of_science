<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplicação web interativa que apresenta disputas históricas da epistemologia da ciência através de um mapa navegável com filósofos e cenas de debate.">
    <title>Epistemologia Interativa — O Mapa Epistêmico</title>
    <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="container">
        <div class="map-container map-frame">
            <svg id="graph-container" viewBox="0 0 1000 800" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>

        <div class="story-panel">
            <div id="map-ui">
                <h2 id="main-title">O Mapa Epistêmico</h2>
                <div id="intro-content"></div>
                <hr class="papyri-hr">
                <div id="detail-content" class="fade-in"></div>
                <div class="interaction-buttons" id="button-container"></div>
            </div>

            <div id="chapter-ui" style="display: none;"></div>
        </div>
    </main>

    <!--
    =====================================================================
    ORDEM DE CARREGAMENTO
    =====================================================================
    1. state.js          → cria o namespace App (DEVE ser o primeiro)
    2. data.js           → define Icons, gameData (debateClasses, nodes, edges)
    3. chapter_engine.js → motor compartilhado de capítulos (antes dos chapters)
    4. chapters/*.js     → cada capítulo chama App.registerChapter(...)
    5. graph.js / story.js / interaction.js → motor da aplicação
    6. main.js           → dispara a inicialização

    Ao adicionar um novo capítulo:
      a) Crie chapters/cap_meu_novo.js  (copie _template.js)
      b) Adicione o <script> abaixo, ANTES de graph.js
      c) Adicione a entrada em chapters.json
    =====================================================================
    -->

    <script src="js/state.js"></script>
    <script src="js/data.js"></script>
    <script src="js/chapter_engine.js"></script>

    <!-- Capítulos -->
    <script src="chapters/cap_demarcacao.js"></script>
    <script src="chapters/cap_demarcacao_kuhn.js"></script>
    <script src="chapters/cap_peru.js"></script>
    <script src="chapters/cap_lakatos.js"></script>
    <script src="chapters/cap_kuhn_lakatos.js"></script>

    <!-- Engine -->
    <script src="js/graph.js"></script>
    <script src="js/story.js"></script>
    <script src="js/interaction.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
